services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [backend]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [backend]

  vote:
    build: ./services/vote
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks: [frontend, backend]

  result:
    build: ./services/result
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks: [frontend, backend]

  worker:
    build: ./services/worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [backend]

  seed-data:
    build: ./services/seed-data
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["seed"]
    networks: [backend]

networks:
  frontend:
  backend:
    internal: true
