services:
  vote:
    build:
      context: ../services/vote
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis

  result:
    build:
      context: ../services/result
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      POSTGRES_HOST: db
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      - db

  worker:
    build:
      context: ../services/worker
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      - redis
      - db

  seed-data:
    build:
      context: ../services/seed-data
    environment:
      VOTE_URL: http://vote:8080/
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    depends_on:
      - vote
      - db

  redis:
    image: redis:7-alpine

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
