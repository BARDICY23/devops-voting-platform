global:
  imagePullPolicy: IfNotPresent

topologySpread:
  enabled: false

networkPolicy:
  enabled: false

vote:
  replicaCount: 1
  image:
    repository: docker.io/library/platform-vote
    tag: latest
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  ingress:
    enabled: false
  resources: {}
  autoscaling:
    enabled: false

result:
  replicaCount: 1
  image:
    repository: docker.io/library/platform-result
    tag: latest
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 80
    targetPort: 8081
  ingress:
    enabled: false
  resources: {}
  autoscaling:
    enabled: false

worker:
  replicaCount: 1
  image:
    repository: docker.io/library/platform-worker
    tag: latest
    pullPolicy: Never
  resources: {}

seed:
  enabled: false
  image:
    repository: docker.io/library/platform-seed-data
    tag: latest
    pullPolicy: Never

# Pullable schema-init image used by the Job + initContainers that gate result/worker startup.
dbInit:
  enabled: true
  image:
    repository: docker.io/bitnamilegacy/postgresql
    tag: "17.6.0-debian-12-r4"
    pullPolicy: IfNotPresent

secrets:
  create: true
  existingSecret: ""
  postgresql:
    postgresPassword: postgres
    userPassword: postgres

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  auth:
    username: voting
    password: postgres
    database: votes
  primary:
    persistence:
      enabled: false

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.1-debian-12-r0
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
