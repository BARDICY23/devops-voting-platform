# Dev/local overrides

vote:
  ingress:
    host: vote.dark-lord.xyz
  image:
    tag: "latest"
    pullPolicy: Always

result:
  ingress:
    host: result.dark-lord.xyz
  image:
    tag: "latest"
    pullPolicy: Always

worker:
  image:
    tag: "latest"
    pullPolicy: Always



# Local/dev only: create a plaintext Secret so the Bitnami PostgreSQL chart + apps can start.
# In cloud, set `secrets.create=false` and provision via External Secrets Operator.
secrets:
  create: true
  postgresql:
    postgresPassword: postgres
    userPassword: postgres

seed:
  enabled: true
  image:
    tag: "latest"

# Override stale Redis image
redis:
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: "8.2.1-debian-12-r0"
  replica:
    replicaCount: 1
