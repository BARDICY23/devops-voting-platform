# Dev/local overrides

vote:
  ingress:
    host: vote.dark-lord.xyz
  image:
    tag: "latest"

result:
  ingress:
    host: result.dark-lord.xyz
  image:
    tag: "latest"

worker:
  image:
    tag: "latest"



# Local/dev only: create a plaintext Secret so the Bitnami PostgreSQL chart + apps can start.
# In cloud, set `secrets.create=false` and provision via External Secrets Operator.
secrets:
  create: true
  postgresql:
    postgresPassword: postgres
    userPassword: postgres

seed:
  enabled: true
  image:
    tag: "latest"

# Override stale Redis image tag (7.2.5-debian-12-r4 removed from DockerHub)
redis:
  image:
    tag: "7.4.3-debian-12-r0"
  replica:
    replicaCount: 1
