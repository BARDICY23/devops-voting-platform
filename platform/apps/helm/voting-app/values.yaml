# ==================================================
# Global chart configuration
# ==================================================

imagePullSecrets: []
nameOverride: ""

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

monitoring:
  enabled: false

# ==================================================
# Application services
# ==================================================

vote:
  image:
    repository: bardicy/voting-vote
    tag: "<GIT_SHA>"
  replicaCount: 2
  service:
    port: 80
    targetPort: 8080
  ingress:
    enabled: true
    host: vote.dark-lord.xyz

result:
  image:
    repository: bardicy/voting-result
    tag: "<GIT_SHA>"
  replicaCount: 2
  service:
    port: 80
    targetPort: 8081
  ingress:
    enabled: true
    host: result.dark-lord.xyz

worker:
  image:
    repository: bardicy/voting-worker
    tag: "<GIT_SHA>"
  replicaCount: 1

seed:
  enabled: true
  image:
    repository: bardicy/voting-seed-data
    tag: "<GIT_SHA>"

# ==================================================
# Redis (Bitnami)
# ==================================================
# Use the Bitnami Redis image with its default entrypoint.
# This image includes /bin/bash, which is required by the
# Bitnami Redis Helm chart start scripts.

redis:
  image:
    repository: bitnami/redis
    tag: latest
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi

# ==================================================
# PostgreSQL (Bitnami)
# ==================================================

postgresql:
  image:
    repository: bitnami/postgresql
    tag: latest
  auth:
    username: postgres
    password: postgres
    database: postgres
  primary:
    persistence:
      enabled: true
      size: 1Gi

# ==================================================
# DNS aliases
# ==================================================

dnsAliases:
  enabled: true
  redisMasterServiceName: redis-master
  postgresServiceName: postgres-postgresql

