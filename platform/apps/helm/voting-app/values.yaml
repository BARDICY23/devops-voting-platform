# ==================================================
# Global chart configuration
# ==================================================

global:
  imagePullPolicy: IfNotPresent

networkPolicy:
  enabled: true

imagePullSecrets: []
nameOverride: ""

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ==================================================
# Monitoring integration (optional)
# ==================================================
# NOTE: This app does not expose Prometheus metrics by default.
# Keep ServiceMonitor + app-specific rules disabled unless you add /metrics.
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false

# ==================================================
# Application services
# ==================================================

vote:
  image:
    repository: bardicy/voting-vote
    # CI pushes both :<git-sha> and :latest; Argo Image Updater can write back the git-sha.
    tag: "0.1.0"
    pullPolicy: ""
  replicaCount: 2
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  ingress:
    enabled: true
    host: vote.dark-lord.xyz
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      # Put both ingresses in the same ALB (one ALB, two host rules).
      alb.ingress.kubernetes.io/group.name: voting-app
      alb.ingress.kubernetes.io/group.order: "10"

result:
  image:
    repository: bardicy/voting-result
    tag: "0.1.0"
    pullPolicy: ""
  replicaCount: 2
  service:
    port: 80
    targetPort: 8081
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  ingress:
    enabled: true
    host: result.dark-lord.xyz
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
      alb.ingress.kubernetes.io/group.name: voting-app
      alb.ingress.kubernetes.io/group.order: "20"

worker:
  image:
    repository: bardicy/voting-worker
    tag: "0.1.0"
    pullPolicy: ""
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

seed:
  enabled: false
  image:
    repository: bardicy/voting-seed-data
    tag: "0.1.0"
    pullPolicy: ""
  voteUrl: "http://vote/"
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600

# Creates the votes table if it does not already exist.
# Disable this only if a dedicated migration tool owns schema creation.
dbInit:
  enabled: true
  image:
    repository: docker.io/bitnamilegacy/postgresql
    tag: "17.6.0-debian-12-r4"
    pullPolicy: ""
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 300
  resources: {}

# ==================================================
# Secrets contract (cloud-first)
# ==================================================
# In production, keep `secrets.create=false` and create the secret via External Secrets
# (AWS Secrets Manager → External Secrets Operator → Kubernetes Secret).
# For local/dev, override in values-dev.yaml with `secrets.create=true`.
secrets:
  create: false
  postgresql:
    secretName: voting-app-postgresql
    # Only used when secrets.create=true (dev/local). Do NOT commit real prod creds.
    postgresPassword: ""
    userPassword: ""

# ==================================================
# Redis (Bitnami)
# ==================================================
redis:
  auth:
    # NOTE: The upstream app does not use Redis auth out of the box.
    # If you want to enable it, we can add REDIS_PASSWORD support across vote/worker and lock it down.
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi
  replica:
    replicaCount: 3
    persistence:
      enabled: true
      size: 1Gi

# ==================================================
# PostgreSQL (Bitnami)
# ==================================================
postgresql:
  auth:
    username: voting
    database: votes

    # Cloud-first: the DB passwords MUST come from a Secret (created by ESO in AWS).
    existingSecret: voting-app-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 1Gi

# ==================================================
# Availability & scaling (disabled by default)
# ==================================================

pdb:
  enabled: false
  minAvailable: 1

hpa:
  enabled: false
  vote:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  result:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

topologySpread:
  enabled: false
