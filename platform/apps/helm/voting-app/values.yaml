# ==================================================
# Global chart configuration
# ==================================================

imagePullSecrets: []
nameOverride: ""

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

monitoring:
  enabled: false
  serviceMonitor:
    enabled: false

# ==================================================
# Application services
# ==================================================

vote:
  image:
    repository: bardicy/voting-vote
    tag: "72a463656026f116cb46361251670b659642eb9d"
  replicaCount: 2
  service:
    port: 80
    targetPort: 8080
  ingress:
    enabled: true
    host: vote.dark-lord.xyz

result:
  image:
    repository: bardicy/voting-result
    tag: "72a463656026f116cb46361251670b659642eb9d"
  replicaCount: 2
  service:
    port: 80
    targetPort: 8081
  ingress:
    enabled: true
    host: result.dark-lord.xyz

worker:
  image:
    repository: bardicy/voting-worker
    tag: "72a463656026f116cb46361251670b659642eb9d"
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

seed:
  enabled: true
  image:
    repository: bardicy/voting-seed-data
    tag: "72a463656026f116cb46361251670b659642eb9d"
  voteUrl: "http://vote/"
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600


# ==================================================
# Redis (Bitnami)
# ==================================================

redis:
  image:
    repository: bitnami/redis
    tag: latest
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 1Gi
  replica:
    replicaCount: 3
    persistence:
      enabled: true
      size: 1Gi

# ==================================================
# PostgreSQL (Bitnami)
# ==================================================

postgresql:
  image:
    repository: bitnami/postgresql
    tag: latest
  auth:
    username: postgres
    password: postgres
    database: postgres
  primary:
    persistence:
      enabled: true
      size: 1Gi

# ==================================================
# Availability & scaling
# ==================================================

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  vote:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  result:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

topologySpread:
  enabled: true

# ==================================================
# DNS aliases
# ==================================================

dnsAliases:
  enabled: false
  redisMasterServiceName: voting-app-redis-master
  postgresServiceName: voting-app-postgresql
