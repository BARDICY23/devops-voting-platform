{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.postgresql.secretName | quote }}
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Bitnami PostgreSQL chart reads the admin password from "postgres-password"
  postgres-password: {{ required "secrets.postgresql.postgresPassword is required when secrets.create=true" .Values.secrets.postgresql.postgresPassword | quote }}
  # ...and the custom user password from "password"
  password: {{ required "secrets.postgresql.userPassword is required when secrets.create=true" .Values.secrets.postgresql.userPassword | quote }}
{{- end }}
