apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "voting-app.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "voting-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      volumes:
        - name: tmp
          emptyDir: {}

      initContainers:
        - name: wait-for-votes-table
          image: "{{ .Values.dbInit.image.repository }}:{{ .Values.dbInit.image.tag }}"
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.dbInit.image.pullPolicy | quote }}
          env:
            - name: POSTGRES_HOST
              value: {{ include "voting-app.postgresqlServiceName" . | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "voting-app.postgresqlSecretName" . | quote }}
                  key: {{ include "voting-app.postgresqlUserPasswordKey" . | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
          command:
            - sh
            - -ec
            - |
              until PGPASSWORD="${POSTGRES_PASSWORD}" psql \
                -h "${POSTGRES_HOST}" \
                -U "${POSTGRES_USER}" \
                -d "${POSTGRES_DB}" \
                -tAc "SELECT 1 FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'votes';" | grep -q 1; do
                echo "Waiting for votes table..."
                sleep 2
              done
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.worker.image.pullPolicy | quote }}
          env:
            - name: REDIS_HOST
              value: {{ include "voting-app.redisMasterServiceName" . | quote }}
            - name: POSTGRES_HOST
              value: {{ include "voting-app.postgresqlServiceName" . | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "voting-app.postgresqlSecretName" . | quote }}
                  key: {{ include "voting-app.postgresqlUserPasswordKey" . | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}

          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  # worker is alive if the process is running
                  pgrep -f "Worker" > /dev/null
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  pgrep -f "Worker" > /dev/null
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
