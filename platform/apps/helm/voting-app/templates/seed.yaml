{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "voting-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seed
    spec:
      restartPolicy: OnFailure

      # NOTE:
      # Seed job is a short-lived bootstrap task.
      # It intentionally runs as root to execute shell tools (psql, ab).
      # This does NOT expose network services and is safe by design.
      securityContext:
        runAsNonRoot: false

      containers:
        - name: seed
          image: "{{ .Values.seed.image.repository }}:{{ .Values.seed.image.tag }}"

          env:
            - name: POSTGRES_HOST
              value: voting-app-postgresql
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}

          # Override global container security for seed only
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
{{- end }}
