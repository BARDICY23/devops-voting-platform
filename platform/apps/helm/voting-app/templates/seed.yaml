{{- if .Values.seed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: seed
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: {{ .Values.seed.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.seed.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "voting-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: seed
    spec:
      restartPolicy: OnFailure
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seed
          image: "{{ .Values.seed.image.repository }}:{{ .Values.seed.image.tag }}"
          env:
            - name: VOTE_URL
              value: {{ .Values.seed.voteUrl | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.dnsAliases.postgresServiceName | quote }}
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
{{- end }}
