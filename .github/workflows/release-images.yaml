name: release-images

on:
  push:
    branches:
      - main
    paths:
      - services/**
      - .github/workflows/release-images.yaml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-images-main
  cancel-in-progress: true

jobs:
  publish:
    name: publish-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: vote
            image: bardicy/voting-vote
          - service: result
            image: bardicy/voting-result
          - service: worker
            image: bardicy/voting-worker
          - service: seed-data
            image: bardicy/voting-seed-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
