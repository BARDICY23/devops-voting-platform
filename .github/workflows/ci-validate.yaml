name: ci-validate

on:
  pull_request:
    branches:
      - main
    paths:
      - services/**
      - platform/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-services:
    name: build-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [vote, result, worker, seed-data]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: local/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image
        uses: aquasecurity/trivy-action@v0.4.0
        with:
          image-ref: local/${{ matrix.service }}:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  validate-compose-and-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate Compose syntax
        run: docker compose -f platform/local/compose.yaml config >/dev/null

      - name: Add Bitnami Helm repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami 

      - name: Build Helm dependencies
        run: helm dependency build platform/apps/helm/voting-app

      - name: Lint Helm chart
        run: |
          helm lint platform/apps/helm/voting-app \
            -f platform/apps/helm/voting-app/values.yaml \
            -f platform/apps/helm/voting-app/values-local.yaml

      - name: Render Helm chart
        run: |
          helm template voting-app platform/apps/helm/voting-app \
            --namespace voting \
            -f platform/apps/helm/voting-app/values.yaml \
            -f platform/apps/helm/voting-app/values-local.yaml >/tmp/voting-app-rendered.yaml
          test -s /tmp/voting-app-rendered.yaml
