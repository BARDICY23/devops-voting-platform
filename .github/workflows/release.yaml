name: release

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      vote: ${{ steps.filter.outputs.vote }}
      result: ${{ steps.filter.outputs.result }}
      worker: ${{ steps.filter.outputs.worker }}
      seed: ${{ steps.filter.outputs.seed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vote:
              - 'services/vote/**'
            result:
              - 'services/result/**'
            worker:
              - 'services/worker/**'
            seed:
              - 'services/seed-data/**'

  push-vote:
    needs: changes
    if: needs.changes.outputs.vote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote
        uses: docker/build-push-action@v6
        with:
          context: ./services/vote
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest

  push-result:
    needs: changes
    if: needs.changes.outputs.result == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push result
        uses: docker/build-push-action@v6
        with:
          context: ./services/result
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/result:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/result:latest

  push-worker:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./services/worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest

  push-seed:
    needs: changes
    if: needs.changes.outputs.seed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push seed-data
        uses: docker/build-push-action@v6
        with:
          context: ./services/seed-data
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/seed-data:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/seed-data:latest
