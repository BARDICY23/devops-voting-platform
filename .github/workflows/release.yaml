name: release

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      vote: ${{ steps.filter.outputs.vote }}
      result: ${{ steps.filter.outputs.result }}
      worker: ${{ steps.filter.outputs.worker }}
      seed: ${{ steps.filter.outputs.seed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            vote:
              - 'services/vote/**'
            result:
              - 'services/result/**'
            worker:
              - 'services/worker/**'
            seed:
              - 'services/seed-data/**'

  push-vote:
    needs: changes
    if: needs.changes.outputs.vote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote
        uses: docker/build-push-action@v6
        with:
          context: ./services/vote
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-vote:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-vote:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed vote image
        uses: aquasecurity/trivy-action@v0.69.3
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/voting-vote:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-vote.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-vote.sarif

  push-result:
    needs: changes
    if: needs.changes.outputs.result == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push result
        uses: docker/build-push-action@v6
        with:
          context: ./services/result
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-result:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-result:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed result image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/voting-result:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-result.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-result.sarif

  push-worker:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./services/worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-worker:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed worker image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/voting-worker:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-worker.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-worker.sarif

  push-seed:
    needs: changes
    if: needs.changes.outputs.seed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push seed-data
        uses: docker/build-push-action@v6
        with:
          context: ./services/seed-data
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-seed-data:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-seed-data:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed seed-data image
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/voting-seed-data:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-seed.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-seed.sarif
